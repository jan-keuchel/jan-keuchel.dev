<!DOCTYPE html>
<html>
    <head>
        <title>keuchel.dev</title>

        {{ if .Param "math" }}
            {{ partialCached "math.html" . }}
        {{ end }}

        {{ $styles := resources.Get "scss/main.scss" | toCSS | minify }}
        <style>{{ $styles.Content | safeCSS }}</style>
    </head>
    <body>
        {{ partial "header.html" . }}

        <div class="content-body">
            {{ block "main" . }}{{ end }}
        </div>

        {{ partial "footer.html" . }}
    </body>
</html>
