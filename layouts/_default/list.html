{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ .Content }}

<h2>Blog Posts</h2>
<div class="cards-container">
    {{ range .Site.RegularPages }}
    {{ if eq .Section "posts" }}
    <article class="card">
        <h3 class="card-title">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h3>
        <p class="card-summary">{{ .Summary }}</p>
        <time class="card-date" datetime="{{ .Date.Format "2006-01-02" }}">
            {{ .Date.Format "January 2, 2006" }}
        </time>
    </article>
    {{ end }}
    {{ end }}
</div>
<p>This text is coming from the <code>/layouts/_default/list.html</code> file.</p>
{{ end }}
