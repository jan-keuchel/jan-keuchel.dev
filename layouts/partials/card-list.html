<div class="cards-container">
    {{ range . }}
    <article class="card">
        <h3 class="card-title">
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </h3>
        <p class="card-summary">{{ .Summary }}</p>
        <time class="card-date" datetime="{{ .Date.Format "2006-01-02" }}">
            {{ .Date.Format "January 2, 2006" }}
        </time>
    </article>
    {{ end }}
</div>
