baseURL: "https://example.org/"
locale: "en-us"
title: "My New Hugo Project"

disableKinds: 
  - "taxonomy"
  - "term"

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
        enable: true
params:
  math: true
