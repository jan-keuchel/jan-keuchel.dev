baseURL: "https://example.org/"
locale: "en-us"
title: "My New Hugo Project"

disableKinds: 
  - "taxonomy"
  - "term"

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
        enable: true
params:
  math: true

menu:
  main:
    - name: 'Home'
      url: '/'
      weight: 10
    - name: 'CV'
      url: '/files/cv.pdf'
      weight: 15
    - name: 'Projects'
      url: '/projects'
      weight: 20
    - name: 'Lectures'
      url: '/lectures'
      weight: 30
    - name: 'Certificates'
      url: '/certificates'
      weight: 40
    - name: 'Contact'
      url: '/contact'
      weight: 50
